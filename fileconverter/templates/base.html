{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZING PDF</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    min-height: 100vh;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    color: #111827;
}

/* PAGE BACKGROUNDS */
body.jpg-bg {
    background: linear-gradient(rgba(37,99,235,0.82), rgba(99,102,241,0.82)),
    url("{% static 'jpg-bg.jpg' %}") center/cover no-repeat fixed;
}

body.pdf-bg {
    background: linear-gradient(rgba(220,38,38,0.82), rgba(249,115,22,0.82)),
    url("{% static 'pdf-bg.jpg' %}") center/cover no-repeat fixed;
}

body.word-bg {
    background: linear-gradient(rgba(30,64,175,0.82), rgba(37,99,235,0.82)),
    url("{% static 'word-bg.jpg' %}") center/cover no-repeat fixed;
}

/* NAVBAR */
.navbar {
    height: 72px;
    background: rgba(255,255,255,0.95);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 55px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 24px;
    font-weight: 800;
    color: #2563eb;
}

.brand img {
    width: 42px;
    height: 42px;
    object-fit: cover;
    border-radius: 6px;
}

.nav-links a {
    margin-left: 26px;
    text-decoration: none;
    font-weight: 700;
    color: #222;
}

/* HOME HERO */
.hero {
    text-align: center;
    padding: 80px 20px 110px;
    background: linear-gradient(135deg, #6366f1, #2563eb);
    color: white;
}

.hero h1 {
    font-size: 48px;
    margin-bottom: 14px;
}

.hero p {
    font-size: 20px;
    opacity: 0.95;
}

/* HOME CARDS */
.container {
    max-width: 1150px;
    margin: -70px auto 60px;
    padding: 0 25px;
}

.tools-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 28px;
}

.tool-card {
    background: white;
    padding: 42px 25px;
    border-radius: 22px;
    text-align: center;
    text-decoration: none;
    color: #111827;
    box-shadow: 0 18px 45px rgba(0,0,0,0.13);
    transition: 0.3s;
}

.tool-card:hover {
    transform: translateY(-10px);
    box-shadow: 0 28px 65px rgba(0,0,0,0.18);
}

.tool-icon {
    font-size: 52px;
    margin-bottom: 18px;
}

.tool-card h3 {
    font-size: 24px;
    margin-bottom: 12px;
}

.tool-card p {
    font-size: 16px;
    color: #6b7280;
    line-height: 1.5;
}

/* UPLOAD PAGES */
.upload-page {
    min-height: calc(100vh - 72px);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 45px 20px;
}

.upload-card {
    width: 100%;
    max-width: 620px;
    padding: 42px;
    background: rgba(255,255,255,0.94);
    border-radius: 24px;
    text-align: center;
    backdrop-filter: blur(15px);
    box-shadow: 0 25px 70px rgba(0,0,0,0.22);
}

.upload-card h2 {
    font-size: 34px;
    margin-bottom: 28px;
}
.drop-box {
    display: block;
    width: 100%;
    border: 2px dashed #2563eb;
    padding: 42px 25px;
    border-radius: 18px;
    cursor: pointer;
    margin-bottom: 24px;
    background: #eff6ff;
    transition: 0.3s;
    text-align: center;
}
.drop-box:hover,
.drop-box.dragover {
    background: #dbeafe;
    transform: scale(1.02);
}

.upload-icon {
    font-size: 42px;
    margin-bottom: 10px;
}

.btn {
    background: linear-gradient(135deg,#6366f1,#2563eb);
    color: white;
    padding: 14px 36px;
    border-radius: 12px;
    border: none;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    margin-top: 8px;
}

.back {
    display: block;
    margin-top: 22px;
    text-decoration: none;
    color: #2563eb;
    font-weight: 700;
}

.msg {
    margin-top: 16px;
    color: green;
    font-weight: 700;
}

@media (max-width: 900px) {
    .tools-grid {
        grid-template-columns: repeat(2, 1fr);
    }

    .nav-links {
        display: none;
    }
}

@media (max-width: 600px) {
    .navbar {
        padding: 0 18px;
    }

    .hero h1 {
        font-size: 32px;
    }

    .tools-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body class="{% block body_class %}{% endblock %}">

<div class="navbar">
    <div class="brand">
        <img src="{% static 'logo.png' %}" alt="Logo">
        <span>ZING PDF</span>
    </div>

    <div class="nav-links">
        <a href="{% url 'index' %}">Home</a>
        <a href="{% url 'jpg_to_pdf' %}">JPG to PDF</a>
        <a href="{% url 'pdf_to_jpg' %}">PDF to JPG</a>
        <a href="{% url 'pdf_to_word' %}">PDF to Word</a>
        <a href="{% url 'word_to_pdf' %}">Word to PDF</a>
    </div>
</div>

{% block content %}{% endblock %}

</body>
</html>
