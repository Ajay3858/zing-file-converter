{% extends 'base.html' %}
{% block body_class %}word-bg{% endblock %}

{% block content %}

<div class="upload-page">
    <div class="upload-card">

        <h2>📘 Word → PDF</h2>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="drop-box" onclick="fileInput.click()">
                <p class="upload-icon">📤</p>
                <p><b>Drag & Drop Word File</b></p>
                <p>or click to browse</p>

                <input type="file" name="doc" id="fileInput" accept=".doc,.docx" hidden required>
            </div>

            <button type="submit" class="btn">Convert</button>
        </form>

        {% if message %}
            <p class="msg">{{ message }}</p>
        {% endif %}

        {% if file %}
            <a href="{% url 'download' %}?file={{ file }}" class="btn">⬇ Download PDF</a>
        {% endif %}

        <a href="{% url 'index' %}" class="back">⬅ Back Home</a>

    </div>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const dropBox = document.querySelector(".drop-box");

fileInput.addEventListener("change", function () {
    if (fileInput.files.length > 0) {
        dropBox.innerHTML = `
            <p class="upload-icon">✅</p>
            <p><b>${fileInput.files[0].name}</b></p>
            <p>File selected successfully</p>
        `;
        dropBox.appendChild(fileInput);
    }
});
</script>

{% endblock %}
